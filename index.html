<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERO-SPHERE V5 - POLISHED & BUG-FREE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #020202;
            color: #aaa;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #scoreboard {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 32px; /* Bigger score numbers */
            font-weight: 900;
            color: #fff;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 15px;
            border-left: 4px solid #555;
            font-family: 'Arial Black', Gadget, sans-serif; /* Thicker numbers */
        }
        #settings-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            cursor: pointer;
            pointer-events: auto;
            z-index: 100;
            opacity: 0.5;
        }
        #settings-toggle:hover { opacity: 1; }
        #settings-panel {
            position: absolute;
            top: 75px;
            right: 25px;
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid #444;
            padding: 18px;
            border-radius: 2px;
            display: none;
            pointer-events: auto;
            width: 240px;
        }
        .setting-row { margin-bottom: 12px; }
        .setting-row label { display: block; font-size: 10px; margin-bottom: 6px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #777; }
        .goal-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 70px;
            font-weight: bold;
            color: #fff;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 10;
        }
        #countdown-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            display: none;
            pointer-events: none;
            z-index: 11;
        }
        .controls-hint {
            position: absolute;
            bottom: 40px; /* Aligned with the bottom of the gauges */
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1.5;
            pointer-events: none;
            font-weight: bold;
        }
        #p1-controls { left: 65px; text-align: left; }
        #p2-controls { right: 65px; text-align: right; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="scoreboard">BLUE <span id="score-blue" style="color: #0074D9">0</span> - <span id="score-orange" style="color: #FF851B">0</span> ORANGE</div>
    <div id="goal-msg" class="goal-msg">GOAL!</div>
    <div id="countdown-msg">3</div>
    
    <div class="controls-hint" id="p1-controls">
        <span id="p1-name" style="color: #0074D9">BLUE</span><br>
        WASD: MOVE<br>
        R: BOOST<br>
        T: JUMP
    </div>
    <div class="controls-hint" id="p2-controls">
        <span id="p2-name" style="color: #FF851B">ORANGE</span><br>
        ARROWS: MOVE<br>
        ,: BOOST<br>
        .: JUMP
    </div>
</div>

<div id="settings-toggle">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
</div>

<div id="settings-panel">
    <div class="setting-row">
        <label>Sensitivity</label>
        <input type="range" id="slider-sens" min="0.05" max="0.5" step="0.01" value="0.2">
    </div>
    <div class="setting-row">
        <label>Boost Power</label>
        <input type="range" id="slider-boost" min="0.1" max="0.5" step="0.01" value="0.22">
    </div>
    <div class="setting-row">
        <label>Gravity</label>
        <input type="range" id="slider-weight" min="0.01" max="0.2" step="0.01" value="0.07">
    </div>
    <div class="setting-row">
        <label>Damping</label>
        <input type="range" id="slider-friction" min="0.95" max="0.999" step="0.001" value="0.982">
    </div>
    <div class="setting-row">
        <label>Blue Team Color</label>
        <input type="color" id="color-blue" value="#0074D9" style="width: 100%; height: 25px; border: none; background: none; cursor: pointer;">
    </div>
    <div class="setting-row">
        <label>Orange Team Color</label>
        <input type="color" id="color-orange" value="#FF851B" style="width: 100%; height: 25px; border: none; background: none; cursor: pointer;">
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * AERO-SPHERE V5 - POLISHED & BUG-FREE
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreBlueEl = document.getElementById('score-blue');
const scoreOrangeEl = document.getElementById('score-orange');
const goalMsgEl = document.getElementById('goal-msg');

const config = {
    gravity: 0.07,
    friction: 0.982,
    restitution: 1.15,
    rotationSensitivity: 0.2, 
    boostPower: 0.22,
    enginePower: 0.18, 
    ballRadius: 18,
    playerRadius: 13,
    postRadius: 5, 
    arenaPadding: 0.1, 
    goalWidth: 100,
    goalHeight: 220, 
    cornerRadius: 80,
    targetRatio: 1.8, // Increased to make the field longer
    colors: {
        blue: '#0074D9',
        orange: '#FF851B',
        ball: '#FFFFFF',
        border: '#555555',
        bg: '#020202'
    }
};

let width, height, arenaWidth, arenaHeight, arenaX, arenaY;
let scoreBlue = 0;
let scoreOrange = 0;
let shakeTime = 0;
let timeScale = 1.0;
let flashTime = 0;
let flashColor = '';
let resetDelay = 0;
const particles = [];
const effects = [];

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// UI Hooks
document.getElementById('slider-sens').addEventListener('input', e => config.rotationSensitivity = parseFloat(e.target.value));
document.getElementById('slider-boost').addEventListener('input', e => config.boostPower = parseFloat(e.target.value));
document.getElementById('slider-weight').addEventListener('input', e => config.gravity = parseFloat(e.target.value));
document.getElementById('slider-friction').addEventListener('input', e => config.friction = parseFloat(e.target.value));

// Color Pickers
document.getElementById('color-blue').addEventListener('input', e => {
    config.colors.blue = e.target.value;
    if (player1) player1.color = e.target.value;
    document.getElementById('score-blue').style.color = e.target.value;
    document.getElementById('p1-name').style.color = e.target.value;
});
document.getElementById('color-orange').addEventListener('input', e => {
    config.colors.orange = e.target.value;
    if (player2) player2.color = e.target.value;
    document.getElementById('score-orange').style.color = e.target.value;
    document.getElementById('p2-name').style.color = e.target.value;
});

document.getElementById('settings-toggle').onclick = () => {
    const p = document.getElementById('settings-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
};

class Vector2D {
    constructor(x = 0, y = 0) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; return this; }
    sub(v) { this.x -= v.x; this.y -= v.y; return this; }
    mult(n) { this.x *= n; this.y *= n; return this; }
    mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
    dist(v) { return Math.sqrt((this.x - v.x) ** 2 + (this.y - v.y) ** 2); }
}

class Entity {
    constructor(x, y, radius, mass, color) {
        this.pos = new Vector2D(x, y);
        this.vel = new Vector2D(0, 0);
        this.acc = new Vector2D(0, 0);
        this.radius = radius;
        this.mass = mass;
        this.color = color;
    }
    applyForce(f) {
        this.acc.x += f.x / this.mass;
        this.acc.y += f.y / this.mass;
    }
    update(ts) {
        this.applyForce(new Vector2D(0, config.gravity * this.mass));
        this.vel.x += (this.acc.x * ts);
        this.vel.y += (this.acc.y * ts);
        this.vel.mult(Math.pow(config.friction, ts));
        this.pos.x += (this.vel.x * ts);
        this.pos.y += (this.vel.y * ts);
        this.acc.mult(0);
    }
}

class Player extends Entity {
    constructor(x, y, color, controls) {
        super(x, y, config.playerRadius, 1.0, color);
        this.controls = controls;
        this.currentAngle = color === config.colors.blue ? 0 : Math.PI;
        this.targetAngle = this.currentAngle;
        this.boost = 112; // Further reduced capacity
        this.isRecharging = false;
        this.pulse = 0;
        this.isTouchingWall = false;
        this.jumping = false;
        this.hasJump = true; // Preserved jump flag
        this.jumpCooldown = 0; // New cooldown timer
    }

    handleInput(ts) {
        let dx = 0, dy = 0;
        if (keys[this.controls.up]) dy -= 1;
        if (keys[this.controls.down]) dy += 1;
        if (keys[this.controls.left]) dx -= 1;
        if (keys[this.controls.right]) dx += 1;

        if (dx !== 0 || dy !== 0) {
            this.targetAngle = Math.atan2(dy, dx);
        }

        let diff = this.targetAngle - this.currentAngle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        this.currentAngle += diff * config.rotationSensitivity * ts;

        // Decrement jump cooldown
        if (this.jumpCooldown > 0) this.jumpCooldown -= ts;

        // Movement Logic
        if (dx !== 0) {
            if (this.isTouchingWall) {
                // Snappy "Normal Speed" lateral movement on ground
                this.applyForce(new Vector2D(dx * config.enginePower, 0));
            } else {
                // Subtle mid-air strafing (30% power)
                this.applyForce(new Vector2D(dx * config.enginePower * 0.3, 0));
            }
        }

        // Boost logic
        if (keys[this.controls.boost] && this.boost > 0) {
            this.isRecharging = false; // Stop recharging if boost is used
            const multiplier = this.isTouchingWall ? 1.0 : 0.9; // 10% less fast in air
            const force = new Vector2D(Math.cos(this.currentAngle), Math.sin(this.currentAngle)).mult(config.boostPower * multiplier);
            this.applyForce(force);
            this.boost -= 0.4 * ts; 
            this.createBoostFlame();
        } else if (this.isTouchingWall) {
            this.isRecharging = true; // Start recharging once a board is touched
        }

        if (this.isRecharging) {
            this.boost = Math.min(112, this.boost + 1.35 * ts);
        }

        // Jump logic: preserved until used, with cooldown
        if (this.isTouchingWall) this.hasJump = true;

        if (keys[this.controls.jump] && !this.jumping && this.hasJump && this.jumpCooldown <= 0) {
            // Jump in the direction the player is facing
            const jumpForce = new Vector2D(Math.cos(this.currentAngle), Math.sin(this.currentAngle)).mult(5.5);
            this.applyForce(jumpForce);
            this.jumping = true;
            this.hasJump = false; // Use the jump
            this.jumpCooldown = 30; // 0.5 seconds at 60fps
            // RECHARGE FIX: Jumping no longer cancels recharge
            effects.push(new JumpAura(this.pos.x, this.pos.y));
        }
        if (!keys[this.controls.jump]) this.jumping = false;
    }

    createBoostFlame() {
        const backAngle = this.currentAngle + Math.PI;
        for (let i = 0; i < 2; i++) {
            const angle = backAngle + (Math.random() - 0.5) * 0.4;
            const speed = 2 + Math.random() * 3;
            particles.push(new Particle(
                this.pos.x + Math.cos(backAngle) * this.radius,
                this.pos.y + Math.sin(backAngle) * this.radius,
                this.color,
                new Vector2D(Math.cos(angle) * speed, Math.sin(angle) * speed),
                'spike'
            ));
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(this.currentAngle);

        if (this.pulse > 0) {
            ctx.beginPath();
            ctx.arc(0, 0, this.radius + (12 - this.pulse), 0, Math.PI * 2);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            this.pulse--;
        }

        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(this.radius * 0.6, 0);
        ctx.lineTo(-this.radius * 0.3, this.radius * 0.4);
        ctx.lineTo(-this.radius * 0.3, -this.radius * 0.4);
        ctx.closePath();
        ctx.fillStyle = config.colors.bg;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(0, 0, this.radius * 0.85, 0.75 * Math.PI, 1.25 * Math.PI);
        ctx.strokeStyle = config.colors.bg;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.restore();
    }
}

class Ball extends Entity {
    constructor(x, y) { super(x, y, config.ballRadius, 0.35, config.colors.ball); } // Lighter ball mass (0.45 -> 0.35)
    draw() {
        ctx.beginPath();
        ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = '#ddd'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.pos.x - this.radius, this.pos.y); ctx.lineTo(this.pos.x + this.radius, this.pos.y);
        ctx.moveTo(this.pos.x, this.pos.y - this.radius); ctx.lineTo(this.pos.x, this.pos.y + this.radius);
        ctx.stroke();
    }
}

class Particle {
    constructor(x, y, color, vel, type = 'circle') {
        this.pos = new Vector2D(x, y);
        this.vel = vel;
        this.life = 1.0;
        this.color = color;
        this.type = type;
    }
    update(ts) { 
        this.pos.x += this.vel.x * ts;
        this.pos.y += this.vel.y * ts;
        this.life -= 0.035 * ts; 
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.beginPath();
        if (this.type === 'spike') {
            ctx.moveTo(this.pos.x, this.pos.y);
            ctx.lineTo(this.pos.x - this.vel.x * 2.5, this.pos.y - this.vel.y * 2.5);
            ctx.strokeStyle = this.color; ctx.lineWidth = 2; ctx.stroke();
        } else {
            ctx.arc(this.pos.x, this.pos.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
}

class JumpAura {
    constructor(x, y) { this.x = x; this.y = y; this.life = 1.0; }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 8 + (1 - this.life) * 45, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 255, 255, ${this.life * 0.4})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        this.life -= 0.06;
    }
}

let player1, player2, ball, posts = [];

function init() {
    const winW = window.innerWidth, winH = window.innerHeight;
    if (winW / winH > config.targetRatio) { height = winH; width = height * config.targetRatio; }
    else { width = winW; height = width / config.targetRatio; }
    canvas.width = winW; canvas.height = winH;
    arenaWidth = width * 0.85; arenaHeight = height * 0.85;
    arenaX = (winW - arenaWidth) / 2; arenaY = (winH - arenaHeight) / 2;
    resetPositions();
}

let countdown = 0;
const countdownMsgEl = document.getElementById('countdown-msg');

function resetPositions() {
    // Players start on the ground (bottom of arena)
    const groundY = arenaY + arenaHeight - config.playerRadius;
    player1 = new Player(arenaX + 150, groundY, config.colors.blue, {
        up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', jump: 'KeyT', boost: 'KeyR'
    });
    player2 = new Player(arenaX + arenaWidth - 150, groundY, config.colors.orange, {
        up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', jump: 'Period', boost: 'Comma'
    });

    // Ball starts frozen at 1/3 of the arena height from the bottom
    ball = new Ball(arenaX + arenaWidth / 2, arenaY + (arenaHeight * 2/3));
    
    // Ensure all velocities are zeroed
    player1.vel = new Vector2D(0, 0);
    player2.vel = new Vector2D(0, 0);
    ball.vel = new Vector2D(0, 0);

    posts = [
        { x: arenaX, y: arenaY + arenaHeight / 2 - config.goalHeight / 2 },
        { x: arenaX, y: arenaY + arenaHeight / 2 + config.goalHeight / 2 },
        { x: arenaX + arenaWidth, y: arenaY + arenaHeight / 2 - config.goalHeight / 2 },
        { x: arenaX + arenaWidth, y: arenaY + arenaHeight / 2 + config.goalHeight / 2 }
    ];
}

function resolveCollision(a, b) {
    const d = a.pos.dist(b.pos);
    const minDist = a.radius + b.radius;
    if (d < minDist) {
        if (a instanceof Player && b instanceof Ball) {
            const angleToBall = Math.atan2(b.pos.y - a.pos.y, b.pos.x - a.pos.x);
            let backAngle = a.currentAngle + Math.PI;
            while (backAngle < -Math.PI) backAngle += Math.PI * 2;
            while (backAngle > Math.PI) backAngle -= Math.PI * 2;
            let diff = Math.abs(angleToBall - backAngle);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            // FLIP RESET: Back touch grants boost refill AND a new jump
            if (diff < 0.65) { 
                if (a.boost < 112 || !a.hasJump) { 
                    a.boost = 112; 
                    a.hasJump = true; 
                    a.pulse = 20; // Longer, more visible pulse
                } 
            }
        }
        const nx = (b.pos.x - a.pos.x) / d, ny = (b.pos.y - a.pos.y) / d;
        const overlap = minDist - d;
        const totalMass = a.mass + b.mass;
        a.pos.x -= nx * overlap * (b.mass / totalMass); a.pos.y -= ny * overlap * (b.mass / totalMass);
        b.pos.x += nx * overlap * (a.mass / totalMass); b.pos.y += ny * overlap * (a.mass / totalMass);
        const relVelX = b.vel.x - a.vel.x, relVelY = b.vel.y - a.vel.y;
        const dot = relVelX * nx + relVelY * ny;
        if (dot < 0) {
            const impulse = (2 * dot) / totalMass;
            a.vel.x += impulse * b.mass * nx * config.restitution; a.vel.y += impulse * b.mass * ny * config.restitution;
            b.vel.x -= impulse * a.mass * nx * config.restitution; b.vel.y -= impulse * a.mass * ny * config.restitution;
        }
    }
}

function checkWallCollision(e) {
    const left = arenaX, right = arenaX + arenaWidth, top = arenaY, bottom = arenaY + arenaHeight;
    const r = e.radius, cr = config.cornerRadius;
    const gT = arenaY + arenaHeight/2 - config.goalHeight/2, gB = arenaY + arenaHeight/2 + config.goalHeight/2;
    const inGoalY = (e.pos.y > gT && e.pos.y < gB);
    
    let res = 0.88;
    if (e instanceof Player) e.isTouchingWall = false;

    // Scoring Logic: Entire ball inside the goal box
    if (e instanceof Ball && resetDelay <= 0 && countdown <= 0) {
        if (e.pos.x + r < left && inGoalY) { scoreGoal('orange'); return; }
        if (e.pos.x - r > right && inGoalY) { scoreGoal('blue'); return; }
    }

    // Boundary Handling
    if (e.pos.y + r > bottom) { 
        e.pos.y = bottom - r; 
        const pRes = (e instanceof Player) ? 0.2 : res; // Low bounce for players on floor
        e.vel.y *= -pRes; 
        if (e instanceof Player) { e.isTouchingWall = true; e.vel.x *= 0.95; } // Stabilization friction
    }
    if (e.pos.y - r < top) { e.pos.y = top + r; e.vel.y *= -res; if (e instanceof Player) e.isTouchingWall = true; }

    if (e.pos.x < left || e.pos.x > right) {
        if (inGoalY) {
            const gw = config.goalWidth;
            if (e.pos.x - r < left - gw) { e.pos.x = left - gw + r; e.vel.x *= -res; if (e instanceof Player) e.isTouchingWall = true; }
            if (e.pos.x + r > right + gw) { e.pos.x = right + gw - r; e.vel.x *= -res; if (e instanceof Player) e.isTouchingWall = true; }
            if (e.pos.y - r < gT) { e.pos.y = gT + r; e.vel.y *= -res; if (e instanceof Player) e.isTouchingWall = true; }
            if (e.pos.y + r > gB) { e.pos.y = gB - r; e.vel.y *= -res; if (e instanceof Player) e.isTouchingWall = true; }
        } else {
            if (e.pos.x < left) { e.pos.x = left + r; e.vel.x *= -res; if (e instanceof Player) e.isTouchingWall = true; }
            if (e.pos.x > right) { e.pos.x = right - r; e.vel.x *= -res; if (e instanceof Player) e.isTouchingWall = true; }
        }
    } else {
        if (e.pos.x - r < left && !inGoalY) { e.pos.x = left + r; e.vel.x *= -res; if (e instanceof Player) e.isTouchingWall = true; }
        if (e.pos.x + r > right && !inGoalY) { e.pos.x = right - r; e.vel.x *= -res; if (e instanceof Player) e.isTouchingWall = true; }
    }

    // Rounded Corners
    const corners = [
        { x: left + cr, y: top + cr }, { x: right - cr, y: top + cr },
        { x: left + cr, y: bottom - cr }, { x: right - cr, y: bottom - cr }
    ];
    corners.forEach(c => {
        const d = e.pos.dist(c);
        if (d > cr - r) {
            const isCorner = (c.x === left + cr && e.pos.x < c.x && (c.y === top + cr ? e.pos.y < c.y : e.pos.y > c.y)) ||
                             (c.x === right - cr && e.pos.x > c.x && (c.y === top + cr ? e.pos.y < c.y : e.pos.y > c.y));
            if (isCorner) {
                const nx = (e.pos.x - c.x) / d, ny = (e.pos.y - c.y) / d;
                e.pos.x = c.x + nx * (cr - r); e.pos.y = c.y + ny * (cr - r);
                const dot = e.vel.x * nx + e.vel.y * ny;
                if (dot > 0) { e.vel.x -= 2 * dot * nx * res; e.vel.y -= 2 * dot * ny * res; }
                if (e instanceof Player) e.isTouchingWall = true;
            }
        }
    });

    // Goal Lip Collision (Sharp square corners matching visual wall thickness)
    posts.forEach(p => {
        const dx = Math.abs(e.pos.x - p.x);
        const dy = Math.abs(e.pos.y - p.y);
        // Only collide if within the 'radius' bounding box of the corner point
        if (dx < r && dy < r) {
            // Determine entry axis to push out cleanly (square feel)
            if (dx > dy) {
                e.pos.x = p.x + (e.pos.x > p.x ? r : -r);
                e.vel.x *= -res;
            } else {
                e.pos.y = p.y + (e.pos.y > p.y ? r : -r);
                e.vel.y *= -res;
            }
            if (e instanceof Player) e.isTouchingWall = true;
        }
    });
}

function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function scoreGoal(team) {
    if (resetDelay > 0 || countdown > 0) return;
    if (team === 'blue') scoreBlue++; else scoreOrange++;
    scoreBlueEl.innerText = scoreBlue; scoreOrangeEl.innerText = scoreOrange;
    
    shakeTime = 30;
    flashTime = 25; 
    // Use dynamic colors for flash
    flashColor = team === 'blue' ? hexToRgba(config.colors.blue, 0.4) : hexToRgba(config.colors.orange, 0.4);
    goalMsgEl.style.opacity = 1;
    timeScale = 0.15;
    resetDelay = 120; // Extended celebration

    // Big Explosion using dynamic colors
    const explosionColor = team === 'blue' ? config.colors.blue : config.colors.orange;
    for (let i = 0; i < 80; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 5 + Math.random() * 15;
        particles.push(new Particle(
            ball.pos.x, 
            ball.pos.y, 
            explosionColor, 
            new Vector2D(Math.cos(angle) * speed, Math.sin(angle) * speed),
            Math.random() > 0.5 ? 'spike' : 'circle'
        ));
    }
}

function startCountdown() {
    countdown = 180; // 3 seconds at 60fps
    countdownMsgEl.style.display = 'block';
}

function update() {
    const ts = timeScale;
    
    if (resetDelay > 0) {
        resetDelay--;
        if (resetDelay <= 0) {
            timeScale = 1.0;
            goalMsgEl.style.opacity = 0;
            resetPositions();
            startCountdown();
        }
    }

    if (countdown > 0) {
        countdown--;
        const seconds = Math.ceil(countdown / 60);
        countdownMsgEl.innerText = seconds > 0 ? seconds : "GO!";
        if (countdown <= 0) {
            setTimeout(() => { countdownMsgEl.style.display = 'none'; }, 500);
        }
    }

    // Only update physics and handle input if not resetting or counting down
    if (resetDelay <= 0 && countdown <= 0) {
        player1.handleInput(ts); player2.handleInput(ts);
        player1.update(ts); player2.update(ts); ball.update(ts);
        
        checkWallCollision(player1); checkWallCollision(player2); checkWallCollision(ball);
        resolveCollision(player1, ball); resolveCollision(player2, ball); resolveCollision(player1, player2);
    }
    
    particles.forEach(p => p.update(ts));
    for (let i = particles.length - 1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i, 1);
    for (let i = effects.length - 1; i >= 0; i--) if (effects[i].life <= 0) effects.splice(i, 1);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Background Flash
    if (flashTime > 0) {
        ctx.fillStyle = flashColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        flashTime--;
    }

    ctx.save();
    if (shakeTime > 0) { ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10); shakeTime--; }

    const lx = arenaX, rx = arenaX + arenaWidth, ty = arenaY, by = arenaY + arenaHeight, cr = config.cornerRadius;
    const gT = ty + arenaHeight/2 - config.goalHeight/2, gB = ty + arenaHeight/2 + config.goalHeight/2, gw = config.goalWidth;

    // Goal Zone Fills using dynamic colors
    ctx.fillStyle = hexToRgba(config.colors.blue, 0.2); ctx.fillRect(lx - gw, gT, gw, config.goalHeight);
    ctx.fillStyle = hexToRgba(config.colors.orange, 0.2); ctx.fillRect(rx, gT, gw, config.goalHeight);

    // Arena Outlines (6px Gray)
    ctx.strokeStyle = config.colors.border; ctx.lineWidth = 6; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(lx + cr, ty); ctx.lineTo(rx - cr, ty); ctx.arcTo(rx, ty, rx, ty + cr, cr);
    ctx.lineTo(rx, gT); ctx.lineTo(rx + gw, gT); ctx.lineTo(rx + gw, gB); ctx.lineTo(rx, gB);
    ctx.lineTo(rx, by - cr); ctx.arcTo(rx, by, rx - cr, by, cr);
    ctx.lineTo(lx + cr, by); ctx.arcTo(lx, by, lx, by - cr, cr);
    ctx.lineTo(lx, gB); ctx.lineTo(lx - gw, gB); ctx.lineTo(lx - gw, gT); ctx.lineTo(lx, gT);
    ctx.lineTo(lx, ty + cr); ctx.arcTo(lx, ty, lx + cr, ty, cr);
    ctx.stroke();

    effects.forEach(e => e.draw());
    player1.draw(); player2.draw(); ball.draw();
    particles.forEach(p => p.draw());

    // Boost Gauges
    const gW = 12, gH = 180;
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(40, canvas.height - 220, gW, gH);
    ctx.fillRect(canvas.width - 52, canvas.height - 220, gW, gH);
    // SCALE FIX: 1.6 * 112 = 179.2 (matches gH)
    ctx.fillStyle = config.colors.blue; ctx.fillRect(40, canvas.height - 40 - (player1.boost * 1.6), gW, player1.boost * 1.6);
    ctx.fillStyle = config.colors.orange; ctx.fillRect(canvas.width - 52, canvas.height - 40 - (player2.boost * 1.6), gW, player2.boost * 1.6);

    // Jump Indicators (Glowing dots to show jump is ready)
    if (player1.hasJump) {
        ctx.beginPath(); ctx.arc(46, canvas.height - 235, 4, 0, Math.PI * 2);
        ctx.fillStyle = "#fff"; ctx.shadowBlur = 10; ctx.shadowColor = config.colors.blue; ctx.fill(); ctx.shadowBlur = 0;
    }
    if (player2.hasJump) {
        ctx.beginPath(); ctx.arc(canvas.width - 46, canvas.height - 235, 4, 0, Math.PI * 2);
        ctx.fillStyle = "#fff"; ctx.shadowBlur = 10; ctx.shadowColor = config.colors.orange; ctx.fill(); ctx.shadowBlur = 0;
    }

    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.onresize = init; init(); loop();
</script>
</body>
